<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trends Monitor</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0d1117; 
            color: #c9d1d9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px; /* Un poco más ancho para que quepan dos columnas */
            width: 100%;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 40px;
            border-left: 5px solid #58a6ff;
            padding-left: 20px;
        }

        /* ESTO ES LO NUEVO: La cuadrícula */
        #noticias-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Crea 2 columnas iguales */
            gap: 20px; /* Espacio entre las tarjetas */
        }

        /* Si la pantalla es pequeña (celular), se pone una sola columna */
        @media (max-width: 600px) {
            #noticias-container {
                grid-template-columns: 1fr;
            }
        }

        .noticia-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .noticia-card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tag {
            color: #58a6ff;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .noticia-card h2 {
            font-size: 1.1rem;
            margin: 0 0 20px 0;
            line-height: 1.4;
            color: #f0f6fc;
        }

        .noticia-card a {
            text-decoration: none;
            color: #8b949e;
            font-size: 0.85rem;
            font-weight: 600;
            border-top: 1px solid #30363d;
            padding-top: 15px;
            display: block;
        }

        .noticia-card a:hover {
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tech Trends <span style="color: #58a6ff;">Today</span></h1>
        
        <div id="noticias-container">
            </div>
    </div>

    <script>
        async function cargarNoticias() {
            try {
                const response = await fetch('./datos.json');
                const data = await response.json();
                const container = document.getElementById('noticias-container');
                container.innerHTML = ''; 

                data.forEach(noticia => {
                    const card = document.createElement('div');
                    card.className = 'noticia-card';
                    card.innerHTML = `
                        <div>
                            <span class="tag">TENDENCIA</span>
                            <h2>${noticia.titulo}</h2>
                        </div>
                        <a href="${noticia.enlace}" target="_blank">Leer más en la fuente →</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }
        cargarNoticias();
    </script>
</body>
</html>
